apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-retrain-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-retrain-worker
  template:
    metadata:
      labels:
        app: python-retrain-worker
    spec:
      containers:
        - name: retrain-worker
          image: sktime-agentic-worker:latest
          command: ["python", "-m", "app.retrain_worker"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: VALKEY_URL
              value: redis://valkey:6379
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
            - name: ENABLE_FORECAST_WORKER
              value: "false"
            - name: ENABLE_RETRAIN_WORKER
              value: "true"
