apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-gateway
  template:
    metadata:
      labels:
        app: go-gateway
    spec:
      containers:
        - name: gateway
          image: sktime-agentic-gateway:latest
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: VALKEY_ADDR
              value: valkey:6379
            - name: PREDICTION_TIMEOUT_SECONDS
              value: "30"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
